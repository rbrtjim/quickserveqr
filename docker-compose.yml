services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quickserveqr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5139:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=quickserveqr;Username=postgres;Password=postgres"
      Jwt__Key: "QuickServeQR-SuperSecret-JWT-Key-2024-Min32Chars!!"
      Jwt__Issuer: QuickServeQR
      Jwt__Audience: QuickServeQR-Users
      # Allow both localhost (browser on same machine) and the LAN IP (other devices)
      AllowedOrigins__0: "http://localhost:3000"
      AllowedOrigins__1: "http://192.168.5.80:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
